name: Günlük Akşam Yemeği Tarifi

on:
  schedule:
    - cron: '0 13 * * *'   # Her gün 13:00 UTC = 16:00 Türkiye (UTC+3)
  workflow_dispatch:         # Manuel tetikleme butonu (tek tıkla çalıştır)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-recipe:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # recipe_history.json'ı commit edebilmek için

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Tarifleri gönder
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Tarif geçmişini kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recipe_history.json
          git diff --cached --quiet || git commit -m "chore: tarif geçmişi güncellendi [skip ci]"
          git push
